name: macro-stress-dashboard
region: nyc

services:
  - name: backend
    github:
      repo: DouglasT61/macro_indicator_dashboard
      branch: main
      deploy_on_push: true
    source_dir: .
    dockerfile_path: Dockerfile.backend
    http_port: 8005
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    health_check:
      http_path: /api/v1/health
    routes:
      - path: /api
        preserve_path_prefix: true
    envs:
      - key: APP_ENV
        scope: RUN_TIME
        value: production
      - key: API_HOST
        scope: RUN_TIME
        value: 0.0.0.0
      - key: API_PORT
        scope: RUN_TIME
        value: "8005"
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${macro-db.DATABASE_URL}
      - key: DEMO_MODE
        scope: RUN_TIME
        value: "true"
      - key: SCHEDULER_ENABLED
        scope: RUN_TIME
        value: "true"
      - key: BOOTSTRAP_ON_STARTUP
        scope: RUN_TIME
        value: "true"
      - key: ENABLE_ALERTS
        scope: RUN_TIME
        value: "true"
      - key: REGIME_CONFIG_PATH
        scope: RUN_TIME
        value: backend/config/regime_config.json

static_sites:
  - name: frontend
    github:
      repo: DouglasT61/macro_indicator_dashboard
      branch: main
      deploy_on_push: true
    source_dir: frontend
    build_command: npm ci && npm run build
    output_dir: dist
    envs:
      - key: VITE_API_BASE_URL
        scope: BUILD_TIME
        value: /api/v1

databases:
  - name: macro-db
    engine: PG
    production: true
    version: "16"
